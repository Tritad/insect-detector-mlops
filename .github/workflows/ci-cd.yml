name: CI-CD

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: pytest -q

  deploy_hf_spaces:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        id: precheck
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          if [ -z "${HF_TOKEN}" ] || [ -z "${HF_SPACE_REPO}" ]; then
            echo "HF_TOKEN or HF_SPACE_REPO is missing. Skipping deploy."
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install rsync
        if: steps.precheck.outputs.can_deploy == 'true'
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Clone Hugging Face Space
        if: steps.precheck.outputs.can_deploy == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          HF_SPACE_REPO_CLEAN="$(echo "${HF_SPACE_REPO}" | tr -d '[:space:]' | sed -e 's#^https\?://huggingface\.co/spaces/##' -e 's#^huggingface\.co/spaces/##' -e 's#\.git$##')"
          if ! echo "${HF_SPACE_REPO_CLEAN}" | grep -Eq '^[^/]+/[^/]+$'; then
            echo "Invalid HF_SPACE_REPO format. Expected username/space_name or full Space URL."
            exit 1
          fi
          REPO_URL="https://huggingface.co/spaces/${HF_SPACE_REPO_CLEAN}"
          git -c http.extraHeader="Authorization: Bearer ${HF_TOKEN}" clone "${REPO_URL}" hf-space

      - name: Sync repository to Space
        if: steps.precheck.outputs.can_deploy == 'true'
        run: |
          rsync -av --delete \
            --exclude '.git' \
            --exclude '.github' \
            --exclude '.venv' \
            --exclude '.pytest_cache' \
            --exclude 'hf-space' \
            ./ hf-space/

      - name: Commit and push
        if: steps.precheck.outputs.can_deploy == 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          cd hf-space
          HF_SPACE_REPO_CLEAN="$(echo "${HF_SPACE_REPO}" | tr -d '[:space:]' | sed -e 's#^https\?://huggingface\.co/spaces/##' -e 's#^huggingface\.co/spaces/##' -e 's#\.git$##')"
          REPO_URL="https://huggingface.co/spaces/${HF_SPACE_REPO_CLEAN}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "chore: auto deploy from GitHub Actions (${GITHUB_SHA})"
          git -c http.extraHeader="Authorization: Bearer ${HF_TOKEN}" push "${REPO_URL}" HEAD:main
